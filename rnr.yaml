# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  rnr.yaml — Konfiguracja Projektu i Potoku Wdrożeniowego               ║
# ║  Projekt: runner                                                         ║
# ║                                                                          ║
# ║  ✅ BEZPIECZNY DO COMMITOWANIA — brak tokenów i haseł                  ║
# ║  🔒 Tokeny i credentials WYŁĄCZNIE w rnr.conf.yaml (gitignored)        ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ─── Projekt ─────────────────────────────────────────────────────────────────
project:
  name: "runner"
  version: "1.1.0"
  repo: "dgawenda/runner"

# ─── Środowiska ──────────────────────────────────────────────────────────────
# Definicje środowisk BEZ tokenów i haseł.
# Tokeny i credentials dla każdego środowiska → rnr.conf.yaml → environments.

environments:

  # ── PRODUKCJA ──────────────────────────────────────────────────────────────
  production:
    branch: "master"
    url: ""
    protected: true       # ⚠️  Wymaga potwierdzenia przed wdrożeniem

    deploy:
      provider: "netlify"
      netlify_prod: true  # true = wdróż na produkcyjny URL (--prod)

    database:
      provider: "supabase"

    env:
      NODE_ENV: "production"

  # ── STAGING ────────────────────────────────────────────────────────────────
  staging:
    branch: "develop"
    url: ""
    protected: false

    deploy:
      provider: "netlify"
      netlify_prod: false

    database:
      provider: "supabase"

    env:
      NODE_ENV: "staging"

# ─── Etapy Potoku Wdrożeniowego ───────────────────────────────────────────────
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  TYPY ETAPÓW:
#    (brak)     — komenda powłoki z pola 'run'
#    database   — migracja bazy (dostawca z environments.X.database.provider)
#    deploy     — wdrożenie    (dostawca z environments.X.deploy.provider)
#    health     — sprawdzenie dostępności URL
#
#  POLA ETAPU:
#    name          [wymagane]  unikalny identyfikator
#    run           [opcjonalne] komenda powłoki
#    type          [opcjonalne] database | deploy | health
#    allow_failure [opcjonalne] true = nie przerywaj potoku przy błędzie
#    only          [opcjonalne] lista środowisk (np. [production, staging])
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

stages:

  # ── Instalacja zależności ──────────────────────────────────────────────────
  - name: install
    run: npm ci

  # ── Jakość kodu ───────────────────────────────────────────────────────────
  - name: lint
    run: npm run lint
    allow_failure: true

  - name: typecheck
    run: npx tsc --noEmit
    allow_failure: true

  # ── Testy ─────────────────────────────────────────────────────────────────
  - name: test:unit
    run: npm run test:unit -- --run --passWithNoTests
    allow_failure: true

  - name: test:e2e
    run: npm run test:e2e -- --passWithNoTests
    allow_failure: true
    only: [production, staging]

  # ── Build ─────────────────────────────────────────────────────────────────
  - name: build
    run: npm run build
    artifacts: dist/

  # ── Migracje bazy danych ──────────────────────────────────────────────────
  # Dostawca konfigurowany w environments.X.database
  # Credentials (hasła, klucze) → rnr.conf.yaml
  - name: migrate
    type: database
    only: [production, staging]

  # ── Wdrożenie ─────────────────────────────────────────────────────────────
  # Dostawca konfigurowany w environments.X.deploy
  # Tokeny API → rnr.conf.yaml
  - name: deploy
    type: deploy

  # ── Sprawdzenie zdrowia aplikacji ─────────────────────────────────────────
  - name: health
    type: health
    allow_failure: true
